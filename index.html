<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/x-icon" href="ffavicon.ico">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caleb McCarthy — Filmmaker</title>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--w:#f0ece4;--b:#090909;--g:#777}
html,body{width:100%;height:100%;background:var(--b);color:var(--w);font-family:'Special Elite',cursive;overflow:hidden}
body::before{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:.045;
background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
background-size:200px 200px;animation:gr .4s steps(1) infinite}
@keyframes gr{0%{transform:translate(0,0)}25%{transform:translate(-2px,-2px)}50%{transform:translate(2px,1px)}75%{transform:translate(-1px,2px)}100%{transform:translate(0,0)}}
.home-bg{position:fixed;inset:0;background-image:url('images/Lovelight_audance.png');background-size:cover;background-position:center;filter:grayscale(100%);opacity:.52}
.home-bg::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,.85) 100%)}
.home-wrap{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2.5rem}
.home-name{font-family:'Special Elite',cursive;font-size:clamp(2rem,6.5vw,5.5rem);line-height:1.1;color:var(--w);letter-spacing:.04em;opacity:0;animation:fu 1.2s ease .2s forwards}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.home-nav{display:flex;gap:4rem;justify-content:center;opacity:0;animation:fu 1.4s ease .7s forwards}
.home-nav a{font-family:'Courier Prime',monospace;font-size:.9rem;letter-spacing:.3em;color:var(--g);text-decoration:none;position:relative;transition:color .3s}
.home-nav a::after{content:'';position:absolute;bottom:-3px;left:0;width:0;height:1px;background:var(--w);transition:width .4s}
.home-nav a:hover{color:var(--w)}
.home-nav a:hover::after{width:100%}
</style>
</head>
<body>
<div class="home-bg"></div>
<div class="home-wrap">
  <h1 class="home-name">Caleb McCarthy</h1>
  <nav class="home-nav">
    <a href="portfolio.html">Portfolio</a>
    <a href="news.html">News</a>
    <a href="about.html">About &amp; Contact</a>
  </nav>
</div>
</body>
</html>
